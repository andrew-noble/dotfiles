set -s escape-time 0        # remove escape delay so nvim mode switching feels instant
set -g mouse on             # enable mouse scrolling and pane clicking
set -g history-limit 100000 # keep lots of scrollback buffer
set -g mode-keys vi         # use vim keys in copy mode
set -g default-terminal "tmux-256color" # set terminal type so colors render correctly
set -ga terminal-overrides ",*:Tc"      # pass true color support through to nvim
set -g status-style 'bg=#1a1b26 fg=#e0af68' # to match tokyo night scheme

set -g prefix2 C-a          # ctrl-a as additional prefix alongside default ctrl-b
bind-key C-a send-prefix -2

# vim keys for pane switching (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# alt+h/l to cycle tmux windows
bind-key -n M-h previous-window
bind-key -n M-l next-window
